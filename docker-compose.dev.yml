version: "3.8"

services:
  # Database for development
  mysql:
    image: mysql:8.0
    container_name: hups_mysql_dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: projectrepo
      MYSQL_USER: root
      MYSQL_PASSWORD: ""
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - hups_dev_network

  # Redis for development
  redis:
    image: redis:7-alpine
    container_name: hups_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - hups_dev_network

  # Backend development with hot reload
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile.dev
    container_name: hups_backend_dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: ""
      DB_NAME: projectrepo
      DB_PORT: 3306
      JWT_SECRET: your_jwt_secret_for_development
      JWT_EXPIRES_IN: 1d
      EMAIL_USERNAME: your_email@gmail.com
      EMAIL_PASSWORD: your_app_password
      BACKEND_URL: http://localhost:5000
      CLIENT_URL: http://localhost:5173
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - ./Backend:/app
      - /app/node_modules
      - backend_dev_uploads:/app/uploads
    networks:
      - hups_dev_network
    depends_on:
      - mysql
      - redis
    command: npm run dev

volumes:
  mysql_dev_data:
    driver: local
  backend_dev_uploads:
    driver: local

networks:
  hups_dev_network:
    driver: bridge
